name: Release

# Pure-shell port of the old GitHub pipeline for our self-hosted Forgejo
# (git.paths.place). No JS actions, no node runtime: checkout is a git clone,
# both platforms build in ONE job (runner capacity is 1, so the old
# linux/windows/release jobs ran sequentially anyway), and the release is
# published with the Forgejo API (curl + jq) via .forgejo/publish-release-asset.sh.
#
# Container: catthehacker/ubuntu:act-22.04 (jammy) instead of two containers.
#   - Linux native AND the Windows mingw cross-compile run here.
#   - carbin-garage COMPILES SDL3 from source for Windows (build-deps.sh), which
#     needs jammy's mingw-w64 v10 headers (dxgidebug.h / WASAPI) — focal's 7.x
#     can't build it. So one jammy container covers both targets.
#   - Trade-off (accepted): the Linux binary now floors at jammy's glibc 2.35
#     instead of focal's 2.31 — low floor sacrificed for a single stable image.
#   - This image is actually present on the runner; plain ubuntu:22.04 is not
#     pulled (force_pull: false), so we name the one that exists.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: linux-build
    container: catthehacker/ubuntu:act-22.04
    defaults:
      run:
        shell: bash
    env:
      DEBIAN_FRONTEND: noninteractive
      PROJECT_NAME: carbin-garage
      NIM_VERSION: '2.2.8'
      SERVER:     ${{ github.server_url }}
      REPO:       ${{ github.repository }}
      SHA:        ${{ github.sha }}
      REF:        ${{ github.ref_name }}
      TOKEN:      ${{ github.token }}
      TAG:        ${{ inputs.version }}
      NOTES:      ${{ inputs.notes }}
      PRERELEASE: ${{ inputs.prerelease }}

    steps:
      # ── Checkout, in shell ─────────────────────────────────────────────────
      # Clone the dispatched ref using the job's auto token via http.extraheader
      # (keeps the token out of the remote URL / git config). No node, so no
      # actions/checkout needed.
      - name: Checkout
        run: |
          auth="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$TOKEN" | base64 -w0)"
          git -c http.extraheader="$auth" \
            clone --depth 1 --branch "$REF" "$SERVER/$REPO.git" .

      # ── Build deps: SDL3 dev headers (cmake needs them to enable backends;
      #    SDL3 itself is dlopen'd at runtime), mingw-w64 for the Windows cross,
      #    glslang for shader compilation, plus zip/jq/file for packaging+publish.
      #    SDL3_image / SDL3_ttf use VENDORED=ON so no system png/jpeg/freetype.
      - name: Install build dependencies
        run: |
          set -eo pipefail
          echo 'Acquire::Retries "5";' > /etc/apt/apt.conf.d/80-retries
          for attempt in 1 2 3 4 5; do
            apt-get update && \
            apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build curl git pkg-config ca-certificates \
              xz-utils file zip jq \
              mingw-w64 mingw-w64-tools \
              libx11-dev libxext-dev libxrandr-dev libxinerama-dev \
              libxi-dev libxfixes-dev libxcursor-dev libxss-dev libxtst-dev \
              libwayland-dev libxkbcommon-dev wayland-protocols \
              libasound2-dev libpulse-dev \
              libdbus-1-dev libibus-1.0-dev libudev-dev \
              libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
              libvulkan-dev \
              glslang-tools \
              && break
            echo "apt attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

      # ── Nim (tarball, not choosenim) ───────────────────────────────────────
      - name: Install Nim ${{ env.NIM_VERSION }}
        run: |
          curl -L "https://nim-lang.org/download/nim-${NIM_VERSION}-linux_x64.tar.xz" \
            | tar xJ -C /opt
          ln -sf /opt/nim-${NIM_VERSION}/bin/nim    /usr/local/bin/nim
          ln -sf /opt/nim-${NIM_VERSION}/bin/nimble /usr/local/bin/nimble
          nim --version

      - name: Download vendor deps
        run: |
          chmod +x ./download-deps.sh
          ./download-deps.sh

      # ── Linux: build vendored SDL3 family static, then the native binary ───
      - name: Build vendored C deps (linux, static)
        run: |
          chmod +x ./build-deps.sh
          ./build-deps.sh --target linux

      - name: Build carbin-garage (linux)
        # Enumerate every static .a in vendor/build/linux/lib inside
        # --start-group/--end-group so the linker resolves cycles.
        run: |
          PASSL_ARGS=("--passL:-Wl,--start-group")
          for lib in vendor/build/linux/lib/*.a; do
              PASSL_ARGS+=("--passL:$lib")
          done
          PASSL_ARGS+=("--passL:-Wl,--end-group")
          nimble -y build -d:release "${PASSL_ARGS[@]}"

      - name: Sanity check (binary type, glibc symbols)
        run: |
          file build/${PROJECT_NAME}
          objdump -T build/${PROJECT_NAME} | grep GLIBC_ | sort -u || true

      - name: Package linux archive
        run: |
          stage=dist/stage-linux
          mkdir -p "$stage"
          cp build/${PROJECT_NAME} "$stage/"
          [ -f README.md ] && cp README.md "$stage/" || true
          [ -f LICENSE ]   && cp LICENSE   "$stage/" || true
          [ -d profiles ]  && cp -r profiles "$stage/" || true
          [ -d shaders ]   && cp -r shaders  "$stage/" || true
          ( cd "$stage" && zip -qr "../${PROJECT_NAME}-${TAG}-linux.zip" . )

      # ── Windows: cross-compile with mingw-w64 (SDL3 family from source) ────
      - name: Build vendored C deps (windows cross, static)
        run: ./build-deps.sh --target windows

      - name: Cross-compile carbin-garage (windows)
        # SDL3's static lib pulls in Win32 system DLLs; system libs go AFTER the
        # static archives so the linker can resolve their imports. (-ldl is
        # Linux-only in nim.cfg, so no libdl stub is needed here.)
        run: |
          PASSL_ARGS=("--passL:-Wl,--start-group")
          for lib in vendor/build/windows/lib/*.a; do
              PASSL_ARGS+=("--passL:$lib")
          done
          PASSL_ARGS+=("--passL:-Wl,--end-group")
          for sysl in winmm ole32 oleaut32 uuid gdi32 user32 shell32 \
                      advapi32 setupapi imm32 version cfgmgr32 ws2_32; do
              PASSL_ARGS+=("--passL:-l$sysl")
          done
          nimble -y build -d:release --os:windows --cpu:amd64 -d:mingw \
            --gcc.exe:x86_64-w64-mingw32-gcc \
            --gcc.linkerexe:x86_64-w64-mingw32-gcc \
            "${PASSL_ARGS[@]}"

      - name: Package windows archive
        run: |
          stage=dist/stage-windows
          mkdir -p "$stage"
          cp build/${PROJECT_NAME}.exe "$stage/"
          [ -f README.md ] && cp README.md "$stage/" || true
          [ -f LICENSE ]   && cp LICENSE   "$stage/" || true
          [ -d profiles ]  && cp -r profiles "$stage/" || true
          [ -d shaders ]   && cp -r shaders  "$stage/" || true
          ( cd "$stage" && zip -qr "../${PROJECT_NAME}-${TAG}-windows.zip" . )

      - name: Diagnose build output
        if: always()
        run: |
          ls -la dist 2>/dev/null || true
          find dist -maxdepth 1 -name "${PROJECT_NAME}-*.zip" -printf '%p (%s bytes)\n' 2>/dev/null || true

      # ── Publish release via the Forgejo API (curl + jq), no action ─────────
      # The script creates the release on the first call and reuses it for the
      # second, and is idempotent across re-runs.
      - name: Publish Forgejo release
        env:
          TARGET_SHA: ${{ github.sha }}
          REL_NAME:   ${{ inputs.version }}
          REL_BODY:   ${{ inputs.notes }}
        run: |
          chmod +x ./.forgejo/publish-release-asset.sh
          ./.forgejo/publish-release-asset.sh "dist/${PROJECT_NAME}-${TAG}-linux.zip"
          ./.forgejo/publish-release-asset.sh "dist/${PROJECT_NAME}-${TAG}-windows.zip"
          echo "==> published: $SERVER/$REPO/releases/tag/$TAG"

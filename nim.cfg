# Default build options for carbin-garage.
# Goal: a single statically-linked executable. SDL3 family + their vendored
# dependencies are linked statically (build-deps.sh produces the .a files);
# only glibc / libdl / libpthread / libm follow the binary out at runtime.

--threads:on
--mm:orc

# Header includes.
--passC:"-Ivendor/sdl3/include"
--passC:"-Ivendor/sdl3_image/include"
--passC:"-Ivendor/sdl3_ttf/include"
--passC:"-Ivendor/cgltf"
--passC:"-Ivendor/bcdec"
--passC:"-Ivendor/libmspack/libmspack/mspack"
--passC:"-Ivendor/stb"
--passC:"-Icsrc"

# Per-target static link flags are passed at build time by release.sh and
# release.yml — they enumerate vendor/build/<target>/lib/*.a and pass them
# inside --start-group/--end-group via command-line --passL args. This file
# only sets the include paths and the runtime / system libs.

# Runtime / system libs that live outside the vendored static libs.
@if linux:
    --passL:"-lm"
    --passL:"-ldl"
    --passL:"-lpthread"
@end

@if windows:
    --passL:"-lwinmm"
    --passL:"-limm32"
    --passL:"-lversion"
    --passL:"-lsetupapi"
    --passL:"-lole32"
    --passL:"-loleaut32"
    --passL:"-luuid"
    --passL:"-lgdi32"
    --passL:"-lws2_32"
    --passL:"-static"
@end
